spring.application.name=OrderService


server.port=9093

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/orderservicedb
spring.datasource.username=root
spring.datasource.password=Nikita*1812

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.h2.console.enabled=true


eureka.client.service-url.defaultZone=http://localhost:8761/eureka




management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
 
management.server.port=8083



resilience4j.circuitbreaker.instances.orderService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.orderService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.orderService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.orderService.slidingWindowType=TIME_BASED
resilience4j.circuitbreaker.instances.orderService.minimumNumberOfCalls=20
resilience4j.circuitbreaker.instances.orderService.waitDurationInOpenState=50s
resilience4j.circuitbreaker.instances.orderService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.orderService.eventConsumerBufferSize=10
#resilience4j.circuitbreaker.instances.orderService.recordFailurePredicate=io.github.robwin.exception.RecordFailurePredicate